name: Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in as much as you can.
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `pip show mcp-awareness-server` or commit hash
      placeholder: "0.1.0 or abc1234"
    validations:
      required: true
  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - stdio
        - streamable-http (local)
        - streamable-http (Cloudflare Tunnel)
    validations:
      required: true
  - type: dropdown
    id: client
    attributes:
      label: MCP Client
      options:
        - Claude.ai (custom connector)
        - Claude Desktop
        - Claude Code
        - Cursor
        - ChatGPT
        - Other (describe below)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Start server with ...
        2. Connect from ...
        3. Call tool ...
        4. See error ...
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any error messages, server logs, or tool responses.
      render: shell
    validations:
      required: false

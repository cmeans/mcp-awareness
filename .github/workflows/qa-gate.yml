name: QA Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  qa-approved:
    runs-on: ubuntu-latest
    steps:
      - name: Check for QA Approved label
        run: |
          if echo '${{ toJSON(github.event.pull_request.labels.*.name) }}' | grep -q '"QA Approved"'; then
            echo "✅ QA Approved label found"
          else
            echo "❌ PR requires the 'QA Approved' label before merging"
            echo "Complete the QA checklist in the PR description, then add the label"
            exit 1
          fi
